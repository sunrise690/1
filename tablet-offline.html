<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>本地刷题系统</title>
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="刷题系统">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <style>
:root {
  color-scheme: light;
  --bg: #f4f6f9;
  --panel: #ffffff;
  --text: #172033;
  --muted: #647086;
  --line: #d9dee8;
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --success: #15803d;
  --danger: #b91c1c;
  --warning: #b7791f;
  --focus: rgba(37, 99, 235, 0.18);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  line-height: 1.5;
}

body.modal-open {
  overflow: hidden;
}

button,
input {
  font: inherit;
}

button {
  min-height: 40px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--text);
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
}

button:hover {
  border-color: var(--primary);
}

button:focus-visible,
label:focus-within {
  outline: 3px solid var(--focus);
  outline-offset: 2px;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.app-shell {
  width: min(960px, calc(100% - 24px));
  margin: 0 auto;
  padding: 20px 0 92px;
}

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}

.app-header h1 {
  margin: 0;
  font-size: clamp(24px, 4vw, 36px);
  line-height: 1.15;
  letter-spacing: 0;
}

.app-header p {
  margin: 6px 0 0;
  color: var(--muted);
  font-size: 14px;
}

.panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: 0 10px 26px rgba(17, 24, 39, 0.06);
}

.controls-panel {
  padding: 14px;
  margin-bottom: 14px;
}

.control-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.control-row.secondary {
  margin-top: 12px;
}

.segmented {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
  width: min(100%, 520px);
}

.segmented.compact {
  grid-template-columns: repeat(3, minmax(0, 1fr));
  width: min(100%, 300px);
}

.segmented button {
  padding: 0 12px;
  white-space: nowrap;
}

.segmented button.active {
  border-color: var(--primary);
  background: var(--primary);
  color: #fff;
}

.file-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 0 14px;
  border: 1px solid var(--primary);
  border-radius: 8px;
  background: var(--primary);
  color: #fff;
  cursor: pointer;
  white-space: nowrap;
}

.file-button input {
  display: none;
}

.stats {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 14px;
  color: var(--muted);
  font-size: 14px;
}

.action-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px;
}

.muted {
  color: var(--muted);
}

.empty-panel {
  padding: 28px;
  margin-bottom: 14px;
  text-align: center;
}

.empty-panel h2 {
  margin: 0 0 8px;
  font-size: 22px;
}

.empty-panel p {
  margin: 0;
  color: var(--muted);
}

.quiz-panel {
  padding: 18px;
}

.quiz-topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.badge {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding: 0 10px;
  border-radius: 999px;
  background: #e8f0ff;
  color: #1d4ed8;
  font-size: 13px;
  font-weight: 700;
}

#progressText {
  margin-left: 8px;
  color: var(--muted);
  font-size: 14px;
}

.favorite-btn {
  width: 42px;
  min-width: 42px;
  padding: 0;
  font-size: 24px;
  line-height: 1;
  color: var(--warning);
}

.favorite-btn.active {
  border-color: #f59e0b;
  background: #fff7e6;
}

.progress-track {
  height: 8px;
  overflow: hidden;
  border-radius: 999px;
  background: #e5e9f0;
}

.progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #10b981);
  transition: width 0.2s ease;
}

.question-title {
  margin: 18px 0;
  font-size: clamp(19px, 2.4vw, 24px);
  line-height: 1.55;
  letter-spacing: 0;
  white-space: pre-wrap;
}

.options-form {
  display: grid;
  gap: 10px;
}

.option-item {
  display: grid;
  grid-template-columns: 24px 1fr;
  gap: 10px;
  align-items: start;
  min-height: 48px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
}

.option-item:hover {
  border-color: var(--primary);
}

.option-item input {
  width: 18px;
  height: 18px;
  margin-top: 3px;
  accent-color: var(--primary);
}

.option-text {
  min-width: 0;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}

.option-key {
  font-weight: 700;
}

.option-item.correct {
  border-color: rgba(21, 128, 61, 0.45);
  background: #f0fdf4;
}

.option-item.wrong {
  border-color: rgba(185, 28, 28, 0.45);
  background: #fef2f2;
}

.result-panel {
  margin-top: 14px;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: #f8fafc;
}

.result-panel.correct {
  border-color: rgba(21, 128, 61, 0.35);
  background: #f0fdf4;
  color: var(--success);
}

.result-panel.wrong {
  border-color: rgba(185, 28, 28, 0.35);
  background: #fef2f2;
  color: var(--danger);
}

.result-panel p {
  margin: 4px 0;
}

.nav-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  position: fixed;
  left: 50%;
  bottom: 10px;
  width: min(928px, calc(100% - 24px));
  transform: translateX(-50%);
  z-index: 20;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.96);
  box-shadow: 0 12px 28px rgba(17, 24, 39, 0.16);
  backdrop-filter: blur(8px);
}

.primary {
  border-color: var(--primary);
  background: var(--primary);
  color: #fff;
}

.primary:hover {
  border-color: var(--primary-dark);
  background: var(--primary-dark);
}

.hidden {
  display: none !important;
}

.catalog-overlay {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(15, 23, 42, 0.42);
}

.catalog-panel {
  width: min(720px, 100%);
  max-height: min(720px, calc(100vh - 32px));
  display: flex;
  flex-direction: column;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
}

.catalog-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px;
  border-bottom: 1px solid var(--line);
}

.catalog-header h2 {
  margin: 0;
  font-size: 20px;
  letter-spacing: 0;
}

.catalog-header p {
  margin: 3px 0 0;
  color: var(--muted);
  font-size: 14px;
}

.catalog-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 14px;
  padding: 10px 14px 0;
  color: var(--muted);
  font-size: 13px;
}

.catalog-legend span {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.legend-dot {
  width: 9px;
  height: 9px;
  border-radius: 999px;
  background: var(--line);
}

.legend-dot.current {
  background: var(--primary);
}

.legend-dot.answered {
  background: var(--success);
}

.legend-dot.wrong {
  background: var(--danger);
}

.legend-dot.favorite {
  background: var(--warning);
}

.catalog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
  gap: 8px;
  overflow: auto;
  padding: 14px;
}

.catalog-item {
  position: relative;
  min-height: 42px;
  padding: 0 6px;
}

.catalog-item.current {
  border-color: var(--primary);
  background: #e8f0ff;
  color: var(--primary-dark);
  font-weight: 700;
}

.catalog-item.answered:not(.current) {
  border-color: rgba(21, 128, 61, 0.42);
  background: #f0fdf4;
}

.catalog-item.wrong {
  border-color: rgba(185, 28, 28, 0.45);
  background: #fef2f2;
  color: var(--danger);
}

.catalog-item.favorite::after {
  content: "★";
  position: absolute;
  right: 3px;
  top: 1px;
  color: var(--warning);
  font-size: 10px;
}

@media (max-width: 720px) {
  .app-shell {
    width: min(100% - 16px, 960px);
    padding-top: 12px;
  }

  .app-header,
  .control-row,
  .control-row.secondary {
    align-items: stretch;
    flex-direction: column;
  }

  .segmented,
  .segmented.compact {
    width: 100%;
  }

  .stats,
  .action-row {
    width: 100%;
  }

  .action-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  }

  .nav-row {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    bottom: 8px;
    width: calc(100% - 16px);
  }
}

@media (max-width: 430px) {
  .segmented {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .segmented.compact {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .controls-panel,
  .quiz-panel {
    padding: 12px;
  }

  .catalog-overlay {
    padding: 8px;
  }

  .catalog-panel {
    max-height: calc(100vh - 16px);
  }
}

</style>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <h1>本地刷题系统</h1>
        <p id="bankStatus">正在读取 questions.txt...</p>
      </div>
      <label class="file-button">
        导入 txt
        <input id="fileInput" type="file" accept=".txt,text/plain">
      </label>
    </header>

    <section class="panel controls-panel" aria-label="练习控制">
      <div class="control-row">
        <div class="segmented" role="group" aria-label="练习模式">
          <button type="button" class="active" data-mode="sequence">顺序练习</button>
          <button type="button" data-mode="random">随机练习</button>
          <button type="button" data-mode="wrong">错题本</button>
          <button type="button" data-mode="favorite">收藏题</button>
        </div>
        <div class="segmented compact" role="group" aria-label="题型筛选">
          <button type="button" class="active" data-filter="all">全部</button>
          <button type="button" data-filter="single">单选</button>
          <button type="button" data-filter="multiple">多选</button>
        </div>
      </div>

      <div class="control-row secondary">
        <div class="stats">
          <span id="questionCount">题库 0 题</span>
          <span id="recordStats">已答 0 / 错题 0 / 收藏 0</span>
        </div>
        <div class="action-row">
          <button type="button" id="restartBtn">重新开始</button>
          <button type="button" id="defaultBankBtn" class="muted">恢复默认题库</button>
          <button type="button" id="clearRecordsBtn" class="muted">清空记录</button>
        </div>
      </div>
    </section>

    <section id="emptyPanel" class="panel empty-panel hidden">
      <h2>未加载题库</h2>
      <p id="emptyMessage">请选择 txt 题库文件。</p>
    </section>

    <section id="quizPanel" class="panel quiz-panel">
      <div class="quiz-topline">
        <div>
          <span id="typeBadge" class="badge">单选</span>
          <span id="progressText">0 / 0</span>
        </div>
        <button type="button" id="favoriteBtn" class="favorite-btn" title="收藏题" aria-label="收藏题">☆</button>
      </div>

      <div class="progress-track" aria-hidden="true">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <h2 id="questionTitle" class="question-title"></h2>
      <form id="optionsForm" class="options-form"></form>

      <div id="resultPanel" class="result-panel hidden"></div>

      <div class="nav-row">
        <button type="button" id="prevBtn">上一题</button>
        <button type="button" id="catalogBtn">题目目录</button>
        <button type="button" id="submitBtn" class="primary">提交答案</button>
        <button type="button" id="nextBtn">下一题</button>
      </div>
    </section>
  </main>

  <div id="catalogOverlay" class="catalog-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="catalogTitle">
    <section class="catalog-panel">
      <header class="catalog-header">
        <div>
          <h2 id="catalogTitle">题目目录</h2>
          <p id="catalogSummary">0 题</p>
        </div>
        <button type="button" id="catalogCloseBtn" aria-label="关闭目录">关闭</button>
      </header>
      <div class="catalog-legend" aria-hidden="true">
        <span><i class="legend-dot current"></i>当前</span>
        <span><i class="legend-dot answered"></i>已答</span>
        <span><i class="legend-dot wrong"></i>错题</span>
        <span><i class="legend-dot favorite"></i>收藏</span>
      </div>
      <div id="catalogGrid" class="catalog-grid"></div>
    </section>
  </div>

n.\r\n敢于担当\r\n\r\nD\r\n.\r\n清正廉洁\r\n正确答案: A B C D\r\n129.党的十八大以来，党坚持依规治党，严格遵守党章，形成比较完善的党内法规体系，严格制度执行，党的建设（）水平明显提高。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n科学化\r\n\r\nB\r\n.\r\n制度化\r\n\r\nC\r\n.\r\n程序化\r\n\r\nD\r\n.\r\n规范化\r\n正确答案: A B D\r\n130.改革开放只有进行时、没有完成时，因为（ ）。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n这是社会基本矛盾运动规律的深刻反映\r\n\r\nB\r\n.\r\n这是总结世界社会主义实践经验得出的重要结论\r\n\r\nC\r\n.\r\n这是推进党和人民事业发展的必然要求\r\n\r\nD\r\n.\r\n全面建设社会主义现代化国家，根本动力仍然是改革开放\r\n正确答案: A B C D\r\n131.全面深化改革开放，必须（ ）。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n勇于破除一切不合时宜的观念，深入贯彻新理念新思想新战略\r\n\r\nB\r\n.\r\n勇于打破部门利益、行业利益、本位思想，服从国家整体利益\r\n\r\nC\r\n.\r\n勇于破除根本制度、基本制度障碍，构建系统完备、科学规范、运行有效的制度体系\r\n\r\nD\r\n.\r\n勇于破解我国开放型经济体制建设中的突出问题，积极适应经济全球化新趋势\r\n正确答案: A B D\r\n132.党的十一届三中全会来，我国创造了（ ）两大奇迹，极大地改变了中国的面貌。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n经济快速发展\r\n\r\nB\r\n.\r\n社会长期稳定\r\n\r\nC\r\n.\r\n民族团结\r\n\r\nD\r\n.\r\n“新四大发明”\r\n正确答案: A B\r\n133.改革开放是（ ）。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n决定当代中国命运的关键一招\r\n\r\nB\r\n.\r\n坚持和发展中国特色社会主义的必由之路\r\n\r\nC\r\n.\r\n党和人民大踏步赶上时代的重要法宝\r\n\r\nD\r\n.\r\n完成新时代目标任务的必然要求\r\n正确答案: A B C D\r\n134.始终把群众作为智慧和力量的源泉，始终把（）深深扎根于人民的创造性实践中。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n政治智慧的增长\r\n\r\nB\r\n.\r\n政治素质的提升\r\n\r\nC\r\n.\r\n群众基础的广泛\r\n\r\nD\r\n.\r\n执政本领的增强\r\n正确答案: A B\r\n135.党依靠人民，从小到大、从弱到强，打败了强大的内外敌人，取得了新民主主义革命胜利，实现了（），建立了中华人民共和国。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n人民幸福\r\n\r\nB\r\n.\r\n民族独立\r\n\r\nC\r\n.\r\n人民解放\r\n\r\nD\r\n.\r\n国家富强\r\n正确答案: B C\r\n136.党依靠人民，推进（）走出一条中国特色社会主义道路。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n改革开放\r\n\r\nB\r\n.\r\n社会主义现代化建设\r\n\r\nC\r\n.\r\n全面建成小康社会\r\n\r\nD\r\n.\r\n社会主义现代化国家\r\n正确答案: A B\r\n137.党依靠人民，推动党和国家事业（），推动中国特色社会主义进入新时代。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n经济社会发展\r\n\r\nB\r\n.\r\n人民生活更加富裕\r\n\r\nC\r\n.\r\n发生历史性变革\r\n\r\nD\r\n.\r\n取得历史性成就\r\n正确答案: C D\r\n138.以人民为中心是我们党（）的生动体现，是全心全意为人民服务的时代彰显。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n立党为公\r\n\r\nB\r\n.\r\n落实群众路线\r\n\r\nC\r\n.\r\n坚持宗旨原则\r\n\r\nD\r\n.\r\n执政为民\r\n正确答案: A D\r\n139.不忘初心、牢记使命，说到底是为什么人、靠什么人的问题。以百姓心为心，与人民（），是党的初心，也是党的恒心。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n同呼吸\r\n\r\nB\r\n.\r\n共命运\r\n\r\nC\r\n.\r\n心连心\r\n\r\nD\r\n.\r\n同担当\r\n正确答案: A B C\r\n140.（）确立为自己的初心使命。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n为人民谋幸福\r\n\r\nB\r\n.\r\n为民族谋复兴\r\n\r\nC\r\n.\r\n为世界谋和平\r\n\r\nD\r\n.\r\n为人类谋大同\r\n正确答案: A B\r\n141.以人民为中心的发展思想，不是高高在上的宣传口号，绝对不能只停留在口头上，要全方位贯穿于经济社会发展的各个环节，体现在人民群众（）的扎实提升上。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n使命感\r\n\r\nB\r\n.\r\n获得感\r\n\r\nC\r\n.\r\n幸福感\r\n\r\nD\r\n.\r\n安全感\r\n正确答案: B C D\r\n142.（）与（）相统一，既是马克思主义的价值追求，也是社会主义的本质要求，更是中国共产党人的奋斗目标。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n促进人的全面发展\r\n\r\nB\r\n.\r\n促进社会稳定\r\n\r\nC\r\n.\r\n促进共同富裕\r\n\r\nD\r\n.\r\n促进经济发展\r\n正确答案: A C\r\n143.坚持以人民为中心的发展思想，就要在高质量发展中促进共同富裕，做到（）。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n发展为了人民\r\n\r\nB\r\n.\r\n发展幸福人民\r\n\r\nC\r\n.\r\n发展依靠人民\r\n\r\nD\r\n.\r\n发展成果由人民共享\r\n正确答案: A C D\r\n144.增进民生福祉是（      ）。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n坚持立党为公、执政为民的本质要求\r\n\r\nB\r\n.\r\n社会主义生产的根本目的\r\n\r\nC\r\n.\r\n全面建设社会主义现代化国家的应有之义\r\n\r\nD\r\n.\r\n社会主义和资本主义的根本区别之一\r\n正确答案: A B C D\r\n145.在脱贫攻坚战中，稳定实现贫困人口“两不愁三保障”，即（ ）。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n不愁吃\r\n\r\nB\r\n.\r\n不愁穿\r\n\r\nC\r\n.\r\n义务教育\r\n\r\nD\r\n.\r\n基本医疗\r\n\r\nE\r\n.\r\n住房安全有保障。\r\n正确答案: A B C D E\r\n146.(    )是保障和改善民生的重要方针。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n尽力而为\r\n\r\nB\r\n.\r\n量力而行\r\n\r\nC\r\n.\r\n突出重点\r\n\r\nD\r\n.\r\n正确把握民生和发展的关系\r\n正确答案: A B\r\n147.实施就业优先战略,必须（     ）。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n健全就业公共服务体系\r\n\r\nB\r\n.\r\n完善重点群体就业支持体系\r\n\r\nC\r\n.\r\n扩大高校毕业生就业渠道\r\n\r\nD\r\n.\r\n稳定农民工等重点群体就业\r\n\r\nE\r\n.\r\n加强困难群体就业兜底帮扶\r\n正确答案: A B C D E\r\n148.中国特色的社会保障体系把(   )作为根本出发点和落脚点，推动社会保障事业不断前进。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n坚持人民至上\r\n\r\nB\r\n.\r\n坚持共同富裕\r\n\r\nC\r\n.\r\n增进民生福祉\r\n\r\nD\r\n.\r\n促进社会公平\r\n正确答案: C D\r\n149.社会保障体系主要涉及（  ）等方面。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n社会保险\r\n\r\nB\r\n.\r\n社会救助\r\n\r\nC\r\n.\r\n社会福利\r\n\r\nD\r\n.\r\n社会优抚\r\n正确答案: A B C D\r\n150.加强和创新社会治理，就是（   ）。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n在党的领导下，以政府为主导，以社会多元主体参与为基础\r\n\r\nB\r\n.\r\n以维护人民群众根本利益为核心\r\n\r\nC\r\n.\r\n通过合作、对话、协商、沟通等方式，依法对社会事务、社会组织和社会生活进行引导和规范，化解社会矛盾\r\n\r\nD\r\n.\r\n促进社会公平，推动社会稳定有序发展。\r\n正确答案: A B C D\r\n151.不断创新社会治理方式 .要做到（     ）。 \r\n多选题 (0 分) 0分\r\n\r\nA\r\n.\r\n正确处理好维稳与维权、活力与秩序的关系\r\n\r\nB\r\n.\r\n运用法治思维和法治方式统筹社会力量、平衡社会利益、调节社会关系。\r\n\r\nC\r\n.\r\n强化互联网思维，推进政府决策科学化、社会治理精准化、公共服务高效化。\r\n\r\nD\r\n.\r\n坚持系统思维，综合运用专业化工作方法提升社会治理效能\r\n正确答案: A B C D\r\n";

<script>
(function () {
  "use strict";

  const STORAGE = {
    wrong: "localQuiz.wrongIds.v1",
    favorite: "localQuiz.favoriteIds.v1",
    records: "localQuiz.answerRecords.v1",
    progress: "localQuiz.progress.v1",
    importedBank: "localQuiz.importedBank.v1",
    importedBankName: "localQuiz.importedBankName.v1"
  };

  const dom = {
    bankStatus: document.getElementById("bankStatus"),
    fileInput: document.getElementById("fileInput"),
    modeButtons: Array.from(document.querySelectorAll("[data-mode]")),
    filterButtons: Array.from(document.querySelectorAll("[data-filter]")),
    questionCount: document.getElementById("questionCount"),
    recordStats: document.getElementById("recordStats"),
    restartBtn: document.getElementById("restartBtn"),
    defaultBankBtn: document.getElementById("defaultBankBtn"),
    clearRecordsBtn: document.getElementById("clearRecordsBtn"),
    emptyPanel: document.getElementById("emptyPanel"),
    emptyMessage: document.getElementById("emptyMessage"),
    quizPanel: document.getElementById("quizPanel"),
    typeBadge: document.getElementById("typeBadge"),
    progressText: document.getElementById("progressText"),
    progressBar: document.getElementById("progressBar"),
    favoriteBtn: document.getElementById("favoriteBtn"),
    questionTitle: document.getElementById("questionTitle"),
    optionsForm: document.getElementById("optionsForm"),
    resultPanel: document.getElementById("resultPanel"),
    prevBtn: document.getElementById("prevBtn"),
    catalogBtn: document.getElementById("catalogBtn"),
    submitBtn: document.getElementById("submitBtn"),
    nextBtn: document.getElementById("nextBtn"),
    catalogOverlay: document.getElementById("catalogOverlay"),
    catalogCloseBtn: document.getElementById("catalogCloseBtn"),
    catalogSummary: document.getElementById("catalogSummary"),
    catalogGrid: document.getElementById("catalogGrid")
  };

  const state = {
    questions: [],
    questionMap: new Map(),
    activeIds: [],
    mode: "sequence",
    filter: "all",
    currentIndex: 0,
    bankHash: "",
    bankSource: "",
    drafts: {}
  };

  const store = {
    wrongIds: new Set(readJson(STORAGE.wrong, [])),
    favoriteIds: new Set(readJson(STORAGE.favorite, [])),
    records: readJson(STORAGE.records, {})
  };

  bindEvents();
  loadInitialBank();

  function bindEvents() {
    dom.fileInput.addEventListener("change", handleFileImport);

    dom.modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        state.mode = button.dataset.mode;
        rebuildPractice({ resetIndex: true, reshuffle: state.mode === "random" });
      });
    });

    dom.filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        state.filter = button.dataset.filter;
        rebuildPractice({ resetIndex: true, reshuffle: state.mode === "random" });
      });
    });

    dom.restartBtn.addEventListener("click", () => {
      rebuildPractice({ resetIndex: true, reshuffle: state.mode === "random" });
    });

    dom.clearRecordsBtn.addEventListener("click", clearRecords);
    dom.defaultBankBtn.addEventListener("click", restoreDefaultBank);
    dom.favoriteBtn.addEventListener("click", toggleFavorite);
    dom.prevBtn.addEventListener("click", () => moveQuestion(-1));
    dom.nextBtn.addEventListener("click", () => moveQuestion(1));
    dom.submitBtn.addEventListener("click", () => submitAnswer());
    dom.catalogBtn.addEventListener("click", openCatalog);
    dom.catalogCloseBtn.addEventListener("click", closeCatalog);
    dom.catalogOverlay.addEventListener("click", (event) => {
      if (event.target === dom.catalogOverlay) closeCatalog();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !dom.catalogOverlay.classList.contains("hidden")) {
        closeCatalog();
      }
    });

    window.addEventListener("beforeunload", saveProgress);
  }

  async function loadInitialBank() {
    const cachedBank = localStorage.getItem(STORAGE.importedBank);
    if (cachedBank && cachedBank.trim()) {
      const cachedName = localStorage.getItem(STORAGE.importedBankName) || "上次导入的题库";
      loadBankText(cachedBank, `${cachedName}（已保存）`);
      return;
    }

    const embeddedBank = getEmbeddedBankText();
    if (embeddedBank) {
      loadBankText(embeddedBank, "离线内置题库");
      return;
    }

    const fetched = await tryFetchQuestionsTxt();

    if (fetched) {
      loadBankText(fetched.text, fetched.source);
      return;
    }

    showEmpty("浏览器未能直接读取 questions.txt，请点击右上角“导入 txt”选择题库文件。");
  }

  function getEmbeddedBankText() {
    if (typeof window.EMBEDDED_QUESTIONS === "string" && window.EMBEDDED_QUESTIONS.trim()) {
      return window.EMBEDDED_QUESTIONS;
    }

    const embeddedNode = document.getElementById("embeddedQuestions");
    if (embeddedNode && embeddedNode.textContent.trim()) {
      return embeddedNode.textContent;
    }

    return "";
  }

  async function tryFetchQuestionsTxt() {
    try {
      const response = await fetch(`questions.txt?ts=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) return null;

      const text = await response.text();
      if (!text.trim()) return null;

      return { text, source: "questions.txt" };
    } catch (error) {
      return null;
    }
  }

  async function handleFileImport(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;

    try {
      const text = await readTextFile(file);
      localStorage.setItem(STORAGE.importedBank, text);
      localStorage.setItem(STORAGE.importedBankName, file.name);
      loadBankText(text, file.name);
      event.target.value = "";
    } catch (error) {
      showEmpty("题库文件读取失败，请确认文件是 txt 文本。");
    }
  }

  async function readTextFile(file) {
    const buffer = await file.arrayBuffer();
    let text = new TextDecoder("utf-8").decode(buffer);
    const badChars = (text.match(/\uFFFD/g) || []).length;

    if (badChars > 2 && "TextDecoder" in window) {
      try {
        text = new TextDecoder("gb18030").decode(buffer);
      } catch (error) {
        // 浏览器不支持 gb18030 时继续使用 UTF-8 结果。
      }
    }

    return text;
  }

  function loadBankText(text, source) {
    const questions = parseQuestions(text);

    if (!questions.length) {
      showEmpty("没有解析到题目，请检查题干、选项和“正确答案:”格式。");
      return;
    }

    state.questions = questions;
    state.questionMap = new Map(questions.map((question) => [question.id, question]));
    state.bankHash = hashString(text);
    state.bankSource = source;

    const savedProgress = readJson(STORAGE.progress, null);
    if (savedProgress && savedProgress.bankHash === state.bankHash) {
      state.mode = savedProgress.mode || "sequence";
      state.filter = savedProgress.filter || "all";
      state.currentIndex = Number(savedProgress.currentIndex) || 0;
      state.activeIds = Array.isArray(savedProgress.activeIds) ? savedProgress.activeIds : [];
      rebuildPractice({ resetIndex: false, useSavedOrder: true });
    } else {
      state.mode = "sequence";
      state.filter = "all";
      state.currentIndex = 0;
      rebuildPractice({ resetIndex: true });
    }
  }

  /*
   * 题库解析函数：
   * 1. 按章节标题识别题型，例如“一、单选题”“二、多选题”。
   * 2. 将选项行 A./B./C. 等解析为 options。
   * 3. 遇到“正确答案:”时收束当前题目，并把 ACD、A B C D、A、B、C 都转成答案数组。
   * 4. 如果题干自带 1.、1、或第1题，会提取为题号；否则使用解析顺序作为题号。
   */
  function parseQuestions(text) {
    const lines = text
      .replace(/^\uFEFF/, "")
      .replace(/\r/g, "")
      .split("\n");

    const questions = [];
    let currentType = "";
    let draft = null;

    const sectionPattern = /^(?:[一二三四五六七八九十百\d]+\s*[、.．]\s*)?(单选题|单项选择题|多选题|多项选择题)(?:\s|[（(]|$)/;
    const typeMetaPattern = /^(单选题|单项选择题|多选题|多项选择题)\s*[（(].*?[）)]\s*\d*\s*分?$/;
    const optionPattern = /^([A-Z])\s*[.．、)]\s*(.*)$/i;
    const optionKeyPattern = /^([A-Z])$/i;
    const optionMarkPattern = /^[.．、)]\s*(.*)$/;
    const answerPattern = /^(?:正确答案|参考答案|答案)\s*[:：]?\s*(.+)$/i;

    const ensureDraft = () => {
      if (!draft) {
        draft = {
          type: currentType,
          stemLines: [],
          options: {},
          lastOptionKey: ""
        };
      }
      return draft;
    };

    const startOption = (key, text) => {
      const item = ensureDraft();
      const optionKey = key.toUpperCase();
      item.options[optionKey] = text.trim();
      item.lastOptionKey = optionKey;
    };

    const finishDraft = (answerText) => {
      if (!draft) return;

      const optionKeys = Object.keys(draft.options).sort();
      const answer = normalizeAnswer(answerText, optionKeys);
      const rawStem = draft.stemLines.join("\n").trim();

      if (rawStem && optionKeys.length && answer.length) {
        const extracted = extractQuestionNumber(rawStem, questions.length + 1);
        const inferredType = answer.length > 1 ? "multiple" : "single";

        questions.push({
          id: "",
          number: extracted.number,
          order: questions.length + 1,
          type: draft.type || inferredType,
          stem: extracted.stem,
          options: optionKeys.map((key) => ({
            key,
            text: draft.options[key].trim()
          })),
          answer
        });
      }

      draft = null;
    };

    for (let index = 0; index < lines.length; index += 1) {
      const line = cleanQuestionLine(lines[index]);
      if (!line) continue;

      const typeMetaMatch = line.match(typeMetaPattern);
      if (typeMetaMatch) {
        const parsedType = typeMetaMatch[1].includes("多") ? "multiple" : "single";
        currentType = parsedType;
        if (draft) draft.type = parsedType;
        continue;
      }

      const sectionMatch = line.match(sectionPattern);
      if (sectionMatch && !optionPattern.test(line) && !answerPattern.test(line)) {
        currentType = sectionMatch[1].includes("多") ? "multiple" : "single";
        draft = null;
        continue;
      }

      if (!draft && isExportNoiseLine(line)) {
        continue;
      }

      const answerMatch = line.match(answerPattern);
      if (answerMatch) {
        finishDraft(answerMatch[1]);
        continue;
      }

      const optionMatch = line.match(optionPattern);
      if (optionMatch) {
        startOption(optionMatch[1], optionMatch[2]);
        continue;
      }

      const optionKeyMatch = line.match(optionKeyPattern);
      if (optionKeyMatch) {
        const marker = findNextNonEmptyLine(lines, index + 1);
        const markMatch = marker ? marker.line.match(optionMarkPattern) : null;
        if (markMatch) {
          startOption(optionKeyMatch[1], markMatch[1]);
          index = marker.index;
          continue;
        }
      }

      if (/^[.．、)]$/.test(line)) {
        continue;
      }

      const item = ensureDraft();
      if (item.lastOptionKey) {
        item.options[item.lastOptionKey] += `\n${line}`;
      } else {
        item.stemLines.push(line);
      }
    }

    const seenIds = new Map();
    questions.forEach((question) => {
      const rawId = hashString(`${question.type}|${question.stem}|${JSON.stringify(question.options)}|${question.answer.join("")}`);
      const count = (seenIds.get(rawId) || 0) + 1;
      seenIds.set(rawId, count);
      question.id = `q_${rawId}_${count}`;
    });

    return questions;
  }

  function cleanQuestionLine(line) {
    return line
      .trim()
      .replace(/\s*此题未答\s*$/g, "")
      .trim();
  }

  function findNextNonEmptyLine(lines, startIndex) {
    for (let index = startIndex; index < lines.length; index += 1) {
      const line = cleanQuestionLine(lines[index]);
      if (line) return { index, line };
    }
    return null;
  }

  function isExportNoiseLine(line) {
    const compact = line.replace(/\s+/g, "");

    return (
      /^\d+$/.test(compact) ||
      /^返回测试练习题库$/.test(compact) ||
      /^答题版本$/.test(compact) ||
      /^答题卡$/.test(compact) ||
      /^答对$/.test(compact) ||
      /^答错$/.test(compact) ||
      /^共\d+题$/.test(compact) ||
      /^试卷得分\d*$/.test(compact) ||
      /^\d{4}[./-]\d{1,2}[./-]\d{1,2}\d{1,2}:\d{2}$/.test(compact)
    );
  }

  function normalizeAnswer(answerText, optionKeys) {
    const allowed = new Set(optionKeys);
    const letters = (answerText.toUpperCase().match(/[A-Z]/g) || [])
      .filter((letter) => allowed.has(letter));

    return Array.from(new Set(letters)).sort();
  }

  function extractQuestionNumber(stem, fallbackNumber) {
    const cleaned = stem.trim();
    const match = cleaned.match(/^(?:第\s*)?(\d+)\s*(?:题)?[、.．:：)]\s*([\s\S]*)$/);

    if (match && match[2].trim()) {
      return {
        number: Number(match[1]),
        stem: match[2].trim()
      };
    }

    return {
      number: fallbackNumber,
      stem: cleaned
    };
  }

  function rebuildPractice(options = {}) {
    const { resetIndex = false, reshuffle = false, useSavedOrder = false } = options;
    const pool = getFilteredQuestions();
    const validIds = new Set(pool.map((question) => question.id));

    if (useSavedOrder && state.activeIds.length) {
      state.activeIds = state.activeIds.filter((id) => validIds.has(id));
    } else {
      state.activeIds = pool.map((question) => question.id);
    }

    if (state.mode === "random" && (reshuffle || !useSavedOrder)) {
      state.activeIds = shuffle(state.activeIds);
    }

    if (resetIndex) {
      state.currentIndex = 0;
    }

    if (state.currentIndex >= state.activeIds.length) {
      state.currentIndex = Math.max(0, state.activeIds.length - 1);
    }

    saveProgress();
    render();
  }

  function getFilteredQuestions() {
    return state.questions.filter((question) => {
      const matchType = state.filter === "all" || question.type === state.filter;
      if (!matchType) return false;

      if (state.mode === "wrong") {
        return store.wrongIds.has(question.id);
      }

      if (state.mode === "favorite") {
        return store.favoriteIds.has(question.id);
      }

      return true;
    });
  }

  function render() {
    updateActiveButtons();
    updateStats();

    if (!state.questions.length) {
      dom.quizPanel.classList.add("hidden");
      return;
    }

    if (!state.activeIds.length) {
      dom.quizPanel.classList.add("hidden");
      showEmpty(getEmptyTextForMode());
      return;
    }

    dom.emptyPanel.classList.add("hidden");
    dom.quizPanel.classList.remove("hidden");

    const question = getCurrentQuestion();
    const record = store.records[question.id];
    const selected = state.drafts[question.id] || (record ? record.selected : []);
    const isFavorite = store.favoriteIds.has(question.id);
    const percent = ((state.currentIndex + 1) / state.activeIds.length) * 100;

    dom.bankStatus.textContent = `${state.bankSource}，已加载 ${state.questions.length} 题`;
    dom.typeBadge.textContent = question.type === "multiple" ? "多选" : "单选";
    dom.progressText.textContent = `第 ${state.currentIndex + 1} / ${state.activeIds.length} 题，题号 ${question.number}`;
    dom.progressBar.style.width = `${percent}%`;
    dom.favoriteBtn.textContent = isFavorite ? "★" : "☆";
    dom.favoriteBtn.classList.toggle("active", isFavorite);
    dom.questionTitle.textContent = question.stem;

    renderOptions(question, selected, record);
    renderResult(question, record);
    if (!dom.catalogOverlay.classList.contains("hidden")) {
      renderCatalog();
    }

    dom.prevBtn.disabled = state.currentIndex === 0;
    dom.nextBtn.disabled = state.currentIndex >= state.activeIds.length - 1;
    dom.catalogBtn.disabled = !state.activeIds.length;
    dom.submitBtn.disabled = question.type === "single";
    dom.submitBtn.textContent = question.type === "single" ? "单选自动判题" : "提交答案";
    dom.submitBtn.classList.toggle("muted", question.type === "single");
    dom.submitBtn.classList.toggle("primary", question.type !== "single");
  }

  function renderOptions(question, selected, record) {
    dom.optionsForm.innerHTML = "";
    const inputType = question.type === "multiple" ? "checkbox" : "radio";

    question.options.forEach((option) => {
      const label = document.createElement("label");
      label.className = "option-item";

      if (record) {
        const selectedThis = record.selected.includes(option.key);
        const correctThis = question.answer.includes(option.key);

        if (correctThis) label.classList.add("correct");
        if (selectedThis && !correctThis) label.classList.add("wrong");
      }

      const input = document.createElement("input");
      input.type = inputType;
      input.name = "answer";
      input.value = option.key;
      input.checked = selected.includes(option.key);
      input.addEventListener("change", () => {
        state.drafts[question.id] = getSelectedAnswers();
        if (question.type === "single") {
          submitAnswer({ auto: true });
        }
      });

      const text = document.createElement("span");
      text.className = "option-text";
      text.innerHTML = `<span class="option-key">${escapeHtml(option.key)}.</span> ${escapeHtml(option.text)}`;

      label.append(input, text);
      dom.optionsForm.appendChild(label);
    });
  }

  function renderResult(question, record) {
    if (!record) {
      dom.resultPanel.className = "result-panel hidden";
      dom.resultPanel.innerHTML = "";
      return;
    }

    const selectedText = record.selected.length ? record.selected.join(" ") : "未选择";
    const answerText = question.answer.join(" ");
    dom.resultPanel.className = `result-panel ${record.correct ? "correct" : "wrong"}`;
    dom.resultPanel.innerHTML = `
      <p><strong>${record.correct ? "回答正确" : "回答错误"}</strong></p>
      <p>你的答案：${escapeHtml(selectedText)}</p>
      <p>正确答案：${escapeHtml(answerText)}</p>
    `;
  }

  function submitAnswer({ auto = false } = {}) {
    const question = getCurrentQuestion();
    if (!question) return;

    const selected = getSelectedAnswers();
    if (!selected.length) {
      if (auto) return;
      dom.resultPanel.className = "result-panel wrong";
      dom.resultPanel.innerHTML = "<p><strong>请先选择答案。</strong></p>";
      return;
    }

    const correct = arraysEqual(selected, question.answer);
    const previous = store.records[question.id];

    store.records[question.id] = {
      selected,
      correct,
      answeredAt: new Date().toISOString(),
      attempts: previous ? previous.attempts + 1 : 1
    };

    if (correct) {
      store.wrongIds.delete(question.id);
    } else {
      store.wrongIds.add(question.id);
    }

    state.drafts[question.id] = selected;
    saveStore();

    if ((state.mode === "wrong" && correct) || state.mode === "favorite") {
      rebuildPractice({ resetIndex: false, useSavedOrder: true });
    } else {
      saveProgress();
      render();
    }
  }

  function toggleFavorite() {
    const question = getCurrentQuestion();
    if (!question) return;

    if (store.favoriteIds.has(question.id)) {
      store.favoriteIds.delete(question.id);
    } else {
      store.favoriteIds.add(question.id);
    }

    saveStore();

    if (state.mode === "favorite") {
      rebuildPractice({ resetIndex: false, useSavedOrder: true });
    } else {
      render();
    }
  }

  function moveQuestion(step) {
    const nextIndex = state.currentIndex + step;
    if (nextIndex < 0 || nextIndex >= state.activeIds.length) return;

    state.currentIndex = nextIndex;
    saveProgress();
    render();
    scrollQuizIntoView();
  }

  function openCatalog() {
    renderCatalog();
    dom.catalogOverlay.classList.remove("hidden");
    document.body.classList.add("modal-open");
  }

  function closeCatalog() {
    dom.catalogOverlay.classList.add("hidden");
    document.body.classList.remove("modal-open");
  }

  function renderCatalog() {
    if (!dom.catalogGrid) return;

    dom.catalogGrid.innerHTML = "";
    dom.catalogSummary.textContent = `${state.activeIds.length} 题`;

    state.activeIds.forEach((id, index) => {
      const question = state.questionMap.get(id);
      if (!question) return;

      const button = document.createElement("button");
      const record = store.records[id];
      button.type = "button";
      button.className = "catalog-item";
      button.textContent = String(index + 1);
      button.title = `第 ${index + 1} 题，题号 ${question.number}`;
      button.classList.toggle("current", index === state.currentIndex);
      button.classList.toggle("answered", Boolean(record));
      button.classList.toggle("wrong", store.wrongIds.has(id));
      button.classList.toggle("favorite", store.favoriteIds.has(id));
      button.addEventListener("click", () => {
        state.currentIndex = index;
        saveProgress();
        render();
        closeCatalog();
        scrollQuizIntoView();
      });

      dom.catalogGrid.appendChild(button);
    });
  }

  function scrollQuizIntoView() {
    window.requestAnimationFrame(() => {
      dom.quizPanel.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  }

  function clearRecords() {
    const confirmed = window.confirm("确定清空答题记录和错题本吗？收藏题会保留。");
    if (!confirmed) return;

    store.records = {};
    store.wrongIds.clear();
    state.drafts = {};
    saveStore();
    rebuildPractice({ resetIndex: true, reshuffle: state.mode === "random" });
  }

  async function restoreDefaultBank() {
    const confirmed = window.confirm("确定恢复默认题库吗？已导入的 txt 会从本机保存中移除，答题记录和收藏不会清空。");
    if (!confirmed) return;

    localStorage.removeItem(STORAGE.importedBank);
    localStorage.removeItem(STORAGE.importedBankName);
    localStorage.removeItem(STORAGE.progress);
    state.drafts = {};

    const embeddedBank = getEmbeddedBankText();
    if (embeddedBank) {
      loadBankText(embeddedBank, "离线内置题库");
      return;
    }

    const fetched = await tryFetchQuestionsTxt();
    if (fetched) {
      loadBankText(fetched.text, fetched.source);
      return;
    }

    showEmpty("已恢复默认设置，但浏览器未能读取默认题库。请点击右上角“导入 txt”选择题库文件。");
  }

  function getSelectedAnswers() {
    return Array.from(dom.optionsForm.querySelectorAll("input[name='answer']:checked"))
      .map((input) => input.value)
      .sort();
  }

  function getCurrentQuestion() {
    return state.questionMap.get(state.activeIds[state.currentIndex]);
  }

  function updateActiveButtons() {
    dom.modeButtons.forEach((button) => {
      button.classList.toggle("active", button.dataset.mode === state.mode);
    });

    dom.filterButtons.forEach((button) => {
      button.classList.toggle("active", button.dataset.filter === state.filter);
    });
  }

  function updateStats() {
    const singleCount = state.questions.filter((question) => question.type === "single").length;
    const multipleCount = state.questions.filter((question) => question.type === "multiple").length;
    const answeredCount = Object.keys(store.records).filter((id) => state.questionMap.has(id)).length;
    const wrongCount = Array.from(store.wrongIds).filter((id) => state.questionMap.has(id)).length;
    const favoriteCount = Array.from(store.favoriteIds).filter((id) => state.questionMap.has(id)).length;

    dom.questionCount.textContent = `题库 ${state.questions.length} 题（单选 ${singleCount} / 多选 ${multipleCount}）`;
    dom.recordStats.textContent = `已答 ${answeredCount} / 错题 ${wrongCount} / 收藏 ${favoriteCount}`;
  }

  function getEmptyTextForMode() {
    if (state.mode === "wrong") return "当前筛选下没有错题。";
    if (state.mode === "favorite") return "当前筛选下没有收藏题。";
    return "当前筛选下没有题目。";
  }

  function showEmpty(message) {
    dom.bankStatus.textContent = message;
    dom.emptyMessage.textContent = message;
    dom.emptyPanel.classList.remove("hidden");
    dom.quizPanel.classList.add("hidden");
    updateStats();
  }

  function saveStore() {
    localStorage.setItem(STORAGE.wrong, JSON.stringify(Array.from(store.wrongIds)));
    localStorage.setItem(STORAGE.favorite, JSON.stringify(Array.from(store.favoriteIds)));
    localStorage.setItem(STORAGE.records, JSON.stringify(store.records));
  }

  function saveProgress() {
    if (!state.bankHash) return;

    localStorage.setItem(STORAGE.progress, JSON.stringify({
      bankHash: state.bankHash,
      mode: state.mode,
      filter: state.filter,
      currentIndex: state.currentIndex,
      activeIds: state.activeIds
    }));
  }

  function readJson(key, fallback) {
    try {
      const value = localStorage.getItem(key);
      return value ? JSON.parse(value) : fallback;
    } catch (error) {
      return fallback;
    }
  }

  function arraysEqual(left, right) {
    if (left.length !== right.length) return false;
    return left.every((item, index) => item === right[index]);
  }

  function shuffle(items) {
    const result = items.slice();
    for (let index = result.length - 1; index > 0; index -= 1) {
      const randomIndex = Math.floor(Math.random() * (index + 1));
      [result[index], result[randomIndex]] = [result[randomIndex], result[index]];
    }
    return result;
  }

  function hashString(text) {
    let hash = 2166136261;
    for (let index = 0; index < text.length; index += 1) {
      hash ^= text.charCodeAt(index);
      hash = Math.imul(hash, 16777619);
    }
    return (hash >>> 0).toString(36);
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
})();

</script>

        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
